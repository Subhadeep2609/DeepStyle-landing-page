<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width,initial-scale=1.0">
        <title>DeepStyle Landing Page</title>
        <link rel="stylesheet" href="style.css">
        <link
  href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css"
  rel="stylesheet"
/>
    </head>
    <body>
        <main>
            <nav>
                <div id="logo">
                    <img src="./images/logo-removebg-preview.png" alt="nav logo">
                </div>
                <div id="navigations">
                    <a href="#">New Arrivals</a>
                    <a href="#">Shop</a>
                    <a href="#">Beauty</a>
                    <a href="#">Sales</a>
                    <a href="#">Journal</a>
                </div>
                <div id="nav-icons">
                    <i class="ri-search-line"></i>
                    <img src="./images/8nav.png" alt="nav 8 icon">
                    <span><i class="ri-shopping-cart-2-line"></i></span>
                </div>
            </nav>
            <section id="center-heading">
                <div id="left-heading-image">
                    <img src="./images/sunflower1.png" alt="sunflower image">
                    <h6>Summer Collection</h6>
                </div>
                <div id="center-main-heading">
                    <h1>Make Your Fashion Look More Charming</h1>
                </div>
                <div id="right-heading-image">
                    <img src="./images/pink.png" alt="pink flower image">
                </div>
            </section>
            <section id="left-mid-1">
                <h3>
                    Trandy And Clussy For New Season
                </h3>
                <div id="left-mid-1-image">
                    <img src="./images/s1.png" alt="boy with a cap">
                </div>
            </section>
            <section id="left-mid-2">
                <div id="left-mid-2-top">
                    <img id="yellow-flower-1" src="./images/daisy.png" alt="yellow flower top">
                </div>
                <div id="left-mid-2-bottom-images">
                    <img class="lm2-img img-1" src="./images/s7-removebg-preview.png" alt="boy with hands on shoulder">
                    <img class="lm2-img img-2" src="./images/orange-jacket-cap.png" alt="boy with orange jacket & a cap">
                </div>
            </section>
            <section id="center">
                <img id="center-img2" src="./images/s3-removebg-preview.png" alt="a boy with pink t-shirt">
                <img id="center-img1" src="./images/star.png" alt="star">
            </section>

            <section id="right-mid-1">
                <img id="right-img1" src="./images/s4-removebg-preview.png" alt="a boy with purple jacket">
                <img id="right-img2" src="./images/s5-removebg-preview.png" alt="a boy with sunglasses">
            </section>

            <section id="right-mid-2">
                <img id="right-mid-2-img1" src="./images/round_logo.png" alt="round logo">
                <img id="right-mid-2-img2" src="./images/s6-removebg-preview.png" alt="a boy with red hat">
                <h4>#2022</h4>
            </section>
            <section id="footer-left-top">
                <h2>"</h2>
                <h5>I'm very much of the buy <br> less but  better philosophy. It's what I've never really knew</h5>
            </section>
            <section id="footer-left-bottom">
                <img id="footer-left-bottom-img1" src="./images/sign-removebg-preview.png" alt="sign">
                <img id="footer-left-bottom-img2" src="./images/pink2.png" alt="pink flower top">
            </section>
            <section id="footer-center">
                <button><span>SCROLL DOWN </span><i class="ri-arrow-down-s-line"></i></button>
            </section>
            <section id="footer-right-top">
                <img src="./images/rose-removebg-preview.png" alt="rose">
                <h6>31 May 2022  · Blog</h6>
                <div id="tilt-box"></div>
            </section>
            <section id="footer-right-bottom">
                <h3>01</h3>
                <p>Always be strong and have values</p>
                <button><i class="ri-arrow-right-long-line"></i></button>
            </section>
        </main>
    </body>
</html>
